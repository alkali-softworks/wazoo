name: Nightly Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------
  # STAGE 1: Build all platforms in parallel
  # -------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-2022, macos-latest]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package Electron App
        run: npm run make
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Save the installers temporarily so Stage 2 can harvest them
      - name: Upload Local Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wazoo-build-${{ matrix.os }}
          path: out/make/**/*
          retention-days: 1

  # -------------------------------------------------------------
  # STAGE 2: Combine everything into one single public release
  # -------------------------------------------------------------
  publish:
    name: Publish Public Nightly Release
    needs: build # Wait for all 3 matrix builds to successfully finish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Download every asset compiled in Stage 1 into a local folder
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: final-assets
          pattern: wazoo-build-*
          merge-multiple: true # Flattens them into one clean directory

      - name: Update Public Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: "nightly"
          name: "Nightly Development Build"
          body: |
            This is an automated nightly development build.
            Built from commit: ${{ github.sha }}
          prerelease: true
          allowUpdates: true
          recreateRelease: true # Fresh overwrite of the single target landing page
          artifacts: "final-assets/**/*"
          token: ${{ secrets.GITHUB_TOKEN }}